<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tests — There Be Dragons</title>

  <!--
    Mocha loaded as a regular script (not ESM) so that describe/it/etc.
    are set up as globals before the ESM test files are evaluated.
    Import maps must appear before any module scripts, so they come next.
  -->
  <link rel="stylesheet" href="https://unpkg.com/mocha@10/mocha.css" />
  <script src="https://unpkg.com/mocha@10/mocha.js"></script>

  <script type="importmap">
  {
    "imports": {
      "react":            "https://esm.sh/react@19",
      "react-dom/client": "https://esm.sh/react-dom@19/client",
      "react/jsx-runtime":"https://esm.sh/react@19/jsx-runtime",
      "zustand":          "https://esm.sh/zustand@5?external=react",
      "zustand/vanilla":  "https://esm.sh/zustand@5/vanilla?external=react",
      "zustand/middleware":"https://esm.sh/zustand@5/middleware?external=react",
      "htm":              "https://esm.sh/htm@3",
      "chai":             "https://esm.sh/chai@4"
    }
  }
  </script>

  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f8f8f8; }
    #mocha { max-width: 900px; margin: 0 auto; }
    #mocha h1 a { color: #333; }
    .test-note {
      max-width: 900px; margin: 1rem auto 0; padding: 0.75rem 1rem;
      background: #fffbea; border: 1px solid #d4a017; border-radius: 4px;
      font-size: 0.88rem; color: #555;
    }
    .test-note code { background: #f0f0f0; padding: 0.1em 0.3em; border-radius: 2px; }
  </style>
</head>
<body>

  <p class="test-note">
    Serve from an HTTP server: <code>python3 -m http.server 8080</code>
    then open <code>http://localhost:8080/test.html</code>
  </p>
  <div id="mocha"></div>

  <script>
    mocha.setup({ ui: 'bdd', reporter: 'html', timeout: 8000 })
  </script>

  <!--
    Load each test file sequentially so describe() blocks register
    in order before mocha.run() is called.
  -->
  <script type="module">
    await import('./tests/rng.test.js')
    await import('./tests/puzzles.test.js')
    await import('./tests/store.test.js')
    await import('./tests/room-svg.test.js')
    await import('./tests/components.test.js')

    mocha.run()
  </script>

</body>
</html>
